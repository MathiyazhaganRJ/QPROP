<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qprop Design Studio</title>
    <!-- Include Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .card {
            background: rgba(22, 27, 34, 0.7);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .full-width {
            grid-column: 1 / -1;
        }

        h1 {
            color: #58a6ff;
            grid-column: 1 / -1;
            text-align: center;
            font-weight: 800;
            margin-bottom: 0;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #8b949e;
        }

        input, select {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 0.8rem;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #238636, #2ea043);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(46, 160, 67, 0.4);
        }

        button.secondary {
            background: linear-gradient(135deg, #1f6feb, #388bfd);
        }

        button.secondary:hover {
            box-shadow: 0 4px 12px rgba(56, 139, 253, 0.4);
        }

        pre {
            background: #010409;
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid #30363d;
            overflow-x: auto;
            font-size: 0.85rem;
            height: 350px;
            overflow-y: scroll;
            color: #79c0ff;
        }

        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Qprop Design Studio</h1>
        
        <!-- Step 1: Design Propeller -->
        <div class="card">
            <h2 style="margin-top: 0; color: #7ee787;">1. Design Geometry (Qmil)</h2>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="input-group">
                    <label>Tip Radius (Meters)</label>
                    <input type="number" id="radius" value="0.15" step="0.01">
                </div>
                <div class="input-group">
                    <label>Target Power (Watts)</label>
                    <input type="number" id="power" value="50.0" step="5">
                </div>
                <div class="input-group">
                    <label>Airspeed (m/s)</label>
                    <input type="number" id="speed" value="5.0" step="1">
                </div>
                <div class="input-group">
                    <label>RPM Target</label>
                    <input type="number" id="rpm" value="7000" step="500">
                </div>
            </div>
            
            <div class="input-group">
                <label>Airfoil CL0 (0.0 for Symmetrical, 0.4 for Clark Y)</label>
                <input type="number" id="cl0" value="0.4" step="0.1">
            </div>

            <button onclick="runDesign()">Generate Geometry</button>
            <p id="design-status" style="color: #8b949e; text-align: center; display: none;">Generating...</p>
        </div>

        <div class="card">
            <h2 style="margin-top: 0;">Output File</h2>
            <pre id="output">Run a design to see the CAD geometry here...</pre>
        </div>

        <!-- Step 2: Analyze Propeller -->
        <div class="card full-width">
            <h2 style="margin-top: 0; color: #58a6ff;">2. Motor Analysis (Qprop)</h2>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
                <div class="input-group">
                    <label>Select Motor File</label>
                    <select id="motor">
                        {% for motor in motors %}
                        <option value="{{ motor }}" {% if 'Tarot' in motor %}selected{% endif %}>{{ motor }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="input-group">
                    <label>Battery Voltage (e.g. 22.2 for 6S)</label>
                    <input type="number" id="voltage" value="22.2" step="0.1">
                </div>
                <div class="input-group">
                    <label>Max Sweep Speed (m/s)</label>
                    <input type="number" id="max_speed" value="30" step="1">
                </div>
            </div>
            
            <button class="secondary" onclick="runAnalysis()">Run Analysis & Graph</button>
            <p id="analysis-status" style="color: #8b949e; text-align: center; display: none;">Simulating Physics...</p>

            <div class="chart-container" style="margin-top: 2rem;">
                <canvas id="performanceChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;

        async function runDesign() {
            const status = document.getElementById('design-status');
            const output = document.getElementById('output');
            status.style.display = 'block';
            output.textContent = '';

            const data = {
                radius: parseFloat(document.getElementById('radius').value),
                power: parseFloat(document.getElementById('power').value),
                speed: parseFloat(document.getElementById('speed').value),
                rpm: parseFloat(document.getElementById('rpm').value),
                cl0: parseFloat(document.getElementById('cl0').value)
            };

            const response = await fetch('/design', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            
            if (result.status === 'success') {
                output.textContent = result.prop_data;
                status.textContent = "Geometry Generated Successfully!";
                status.style.color = "#3fb950";
            }
        }

        async function runAnalysis() {
            const status = document.getElementById('analysis-status');
            status.style.display = 'block';
            status.textContent = 'Simulating...';

            const data = {
                motor: document.getElementById('motor').value,
                voltage: parseFloat(document.getElementById('voltage').value),
                max_speed: parseInt(document.getElementById('max_speed').value)
            };

            const response = await fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();

            if (result.status === 'success') {
                status.textContent = "Analysis Complete!";
                status.style.color = "#3fb950";
                drawChart(result.data);
            } else {
                status.textContent = "Error: " + result.message;
                status.style.color = "#f85149";
            }
        }

        function drawChart(data) {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            
            const speeds = data.map(d => d.v);
            const thrust = data.map(d => d.thrust);
            const eff = data.map(d => d.eff * 100);

            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: speeds,
                    datasets: [
                        {
                            label: 'Thrust (Newtons)',
                            data: thrust,
                            borderColor: '#ff7b72',
                            backgroundColor: 'rgba(255, 123, 114, 0.1)',
                            yAxisID: 'y',
                            tension: 0.3,
                            fill: true
                        },
                        {
                            label: 'Overall Efficiency (%)',
                            data: eff,
                            borderColor: '#79c0ff',
                            backgroundColor: 'rgba(121, 192, 255, 0.1)',
                            yAxisID: 'y1',
                            tension: 0.3,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { labels: { color: '#c9d1d9' } },
                        tooltip: { backgroundColor: 'rgba(13, 17, 23, 0.9)' }
                    },
                    scales: {
                        x: {
                            title: { display: true, text: 'Airspeed (m/s)', color: '#8b949e' },
                            ticks: { color: '#8b949e' },
                            grid: { color: '#30363d' }
                        },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: { display: true, text: 'Thrust (Newtons)', color: '#ff7b72' },
                            ticks: { color: '#ff7b72' },
                            grid: { color: '#30363d' }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: { display: true, text: 'Efficiency (%)', color: '#79c0ff' },
                            ticks: { color: '#79c0ff' },
                            grid: { drawOnChartArea: false }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
